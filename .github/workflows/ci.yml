name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Cancel older runs of the same ref — we only care about the latest commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # --- Python quality + test matrix ---------------------------------------
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format --check
        run: ruff format --check .

      - name: Pyright type check (src/)
        # pyright targets src/ only, per pyproject.toml
        run: pyright src/

      - name: Pytest
        run: pytest tests/ -v

  # --- Manifest + marketplace validation ---------------------------------
  manifest:
    name: Plugin manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate plugin.json is well-formed JSON
        run: python -c "import json; json.load(open('.claude-plugin/plugin.json'))"

      - name: Validate marketplace-entry.json is well-formed JSON
        run: python -c "import json; json.load(open('.claude-plugin/marketplace-entry.json'))"

      - name: Verify every hook command points at a real file
        # Same invariant the manifest test suite enforces, but as a
        # standalone CI gate so a broken manifest fails here even if
        # somebody skipped pytest.
        run: |
          python - <<'PY'
          import json, sys
          from pathlib import Path

          m = json.load(open(".claude-plugin/plugin.json"))
          prefix = "${CLAUDE_PLUGIN_ROOT}/"
          errors = []
          for event, groups in m.get("hooks", {}).items():
              for group in groups:
                  for handler in group.get("hooks", []):
                      t = handler.get("type")
                      if t not in {"command", "http"}:
                          errors.append(f"{event}: forbidden hook type {t!r}")
                          continue
                      cmd = handler.get("command", "")
                      if not cmd.startswith(prefix):
                          errors.append(f"{event}: command must start with {prefix}")
                          continue
                      rel = cmd[len(prefix):]
                      if not Path(rel).is_file():
                          errors.append(f"{event}: command points at missing file {rel}")
          if errors:
              for e in errors:
                  print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)
          print("plugin.json OK")
          PY

  # --- Release gate --------------------------------------------------------
  # On version tags, require both matrix jobs above to pass before the
  # "release" job is considered green. Nothing is published from CI yet;
  # this job just provides a single handle a future release workflow can
  # depend on.
  release-gate:
    name: Release gate
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, manifest]
    runs-on: ubuntu-latest
    steps:
      - name: Confirm gates passed
        run: echo "All gates green for ${{ github.ref_name }}"
